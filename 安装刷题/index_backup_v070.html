<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>广东二造·安装刷题 v070</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root, html[data-theme="dark"] {
    --bg:#0f1115; --card:#1a1d24; --line:#2a2e38;
    --txt:#e8eaed; --sub:#9aa0ac;
    --primary:#4a90e2; --primary-bg:#16243a; --primary-tx:#9cc4f0; --primary-active:#1c3150;
    --blue:#4a90e2;
    --ok:#2ecc71; --ok-bg:#16271c;
    --err:#ff6b6b; --err-bg:#2a1f20;
    --warn:#f1c40f;
    --opt-bg:#14171d; --chip-bg:#1a1d24; --tag-bg:#222;
    --headbtn-bg:#222; --switch-off:#333;
    --mask:rgba(0,0,0,.6); --toast-bg:rgba(0,0,0,.85); --sheet-bg:#1a1d24;
  }
  html[data-theme="light"] {
    --bg:#f3f5f8; --card:#ffffff; --line:#e3e7ee;
    --txt:#1f2733; --sub:#6b7280;
    --primary:#2f6fd0; --primary-bg:#e8f0fd; --primary-tx:#2f6fd0; --primary-active:#d3e3fb;
    --blue:#2f6fd0;
    --ok:#1a9e54; --ok-bg:#e7f6ee;
    --err:#e23b3b; --err-bg:#fdeaea;
    --warn:#b8860b;
    --opt-bg:#f6f8fb; --chip-bg:#ffffff; --tag-bg:#eef1f6;
    --headbtn-bg:#eef1f6; --switch-off:#cbd2dc;
    --mask:rgba(0,0,0,.4); --toast-bg:rgba(31,39,51,.9); --sheet-bg:#ffffff;
  }
  body { margin:0; background:var(--bg); color:var(--txt); font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif; padding:12px; }
  header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; gap:8px; }
  h1 { font-size:16px; margin:0; flex:1; }
  .headbtns { display:flex; gap:6px; }
  .headbtn { font-size:12px; padding:6px 10px; background:var(--headbtn-bg); color:var(--sub); border:1px solid var(--line); border-radius:8px; cursor:pointer; white-space:nowrap; }
  .headbtn.on { color:var(--ok); border-color:var(--ok); background:var(--ok-bg); }
  .stat { font-size:12px; color:var(--sub); width:100%; text-align:right; margin-bottom:6px; }
  .modes { display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
  .mode { flex:1; min-width:64px; text-align:center; padding:9px 0; background:var(--card); border:1px solid var(--line); border-radius:10px; font-size:13px; color:var(--sub); cursor:pointer; }
  .mode.active { color:var(--primary-tx); border-color:var(--primary); background:var(--primary-bg); }
  .chapbar { display:flex; gap:6px; overflow-x:auto; margin-bottom:10px; padding-bottom:4px; -webkit-overflow-scrolling:touch; }
  .chapbar::-webkit-scrollbar { height:0; }
  .chip { white-space:nowrap; padding:6px 11px; background:var(--card); border:1px solid var(--line); border-radius:20px; font-size:12px; color:var(--sub); cursor:pointer; }
  .chip.active { color:var(--primary-tx); border-color:var(--blue); background:var(--primary-bg); }
  .chip.sel { color:var(--ok); border-color:var(--ok); background:var(--ok-bg); }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:12px; }
  .qmeta { font-size:12px; color:var(--sub); margin-bottom:8px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .tag { background:var(--tag-bg); border:1px solid var(--line); padding:2px 7px; border-radius:20px; font-size:11px; }
  .chap-tag { background:var(--primary-bg); border:1px solid var(--blue); color:var(--primary-tx); padding:2px 7px; border-radius:20px; font-size:11px; }
  .qtype { color:var(--warn); }
  .stem { font-size:15px; line-height:1.6; margin-bottom:14px; }
  .opt { display:flex; align-items:flex-start; gap:10px; padding:12px; margin-bottom:9px; background:var(--opt-bg); border:1px solid var(--line); border-radius:10px; font-size:14px; cursor:pointer; transition:.15s; }
  .opt.sel { border-color:var(--blue); background:var(--primary-bg); }
  .opt.correct { border-color:var(--ok); background:var(--ok-bg); }
  .opt.wrong { border-color:var(--err); background:var(--err-bg); }
  .optkey { font-weight:700; color:var(--blue); min-width:18px; }
  .opt.correct .optkey { color:var(--ok); }
  .opt.wrong .optkey { color:var(--err); }
  .btns { display:flex; gap:10px; margin-top:6px; flex-wrap:wrap; }
  button { flex:1; padding:13px; border:none; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; min-width:120px; }
  .submit { background:var(--primary); color:#fff; }
  .next { background:var(--blue); color:#fff; }
  .restart { background:var(--primary); color:#fff; }
  .navbtn { flex:1; min-width:80px; background:var(--headbtn-bg); color:var(--txt); border:1px solid var(--line); }
  /* 导航弹窗 */
  .navgrid { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; padding:12px 0; max-height:55vh; overflow-y:auto; }
  .navdot { width:46px; height:46px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:700; cursor:pointer; background:var(--headbtn-bg); color:var(--sub); border:1px solid var(--line); transition:.15s; }
  .navdot.correct { background:var(--ok-bg); color:var(--ok); border-color:var(--ok); }
  .navdot.wrong { background:var(--err-bg); color:var(--err); border-color:var(--err); }
  .navdot.current { border:2px solid var(--primary); font-size:17px; }
  .analysis { margin-top:14px; padding:12px; background:var(--opt-bg); border-left:3px solid var(--warn); border-radius:8px; font-size:13px; line-height:1.6; display:none; }
  .analysis.show { display:block; }
  .analysis b { color:var(--warn); }
  .result { text-align:center; font-size:16px; font-weight:700; margin:10px 0; display:none; }
  .result.show { display:block; }
  .result.ok { color:var(--ok); }
  .result.no { color:var(--err); }
  .empty { text-align:center; color:var(--sub); padding:40px 0; font-size:14px; }
  .progress { font-size:12px; color:var(--sub); text-align:center; margin-bottom:8px; }
  footer { text-align:center; font-size:11px; color:var(--sub); margin-top:14px; }
  .syncbtn { font-size:12px; padding:6px 10px; background:var(--headbtn-bg); color:var(--sub); border:1px solid var(--line); border-radius:8px; }
  /* 打卡条 — 双行布局适配移动端 */
  .checkin { display:flex; flex-direction:column; gap:6px; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:10px 14px; margin-bottom:10px; font-size:13px; }
  .ci-top { display:flex; align-items:center; justify-content:space-between; }
  .ci-bottom { color:var(--sub); font-size:12px; padding-top:2px; }
  .ci-bottom b { color:var(--warn); font-weight:700; }
  .checkin .ci-left { color:var(--sub); flex:1; }
  .checkin .ci-left b { color:var(--warn); font-size:15px; }
  .checkin .ci-btn { padding:7px 14px; border-radius:8px; font-size:13px; font-weight:600; border:none; cursor:pointer; }
  .checkin .ci-btn.go { background:var(--ok); color:#04130a; }
  .checkin .ci-btn.done { background:var(--ok-bg); color:var(--ok); border:1px solid var(--ok); }
  .checkin .ci-btn.disabled { background:var(--switch-off); color:var(--sub); cursor:not-allowed; opacity:.7; }
  /* 题型分隔标识 */
  .typesep { text-align:center; margin:16px 0 12px; }
  .typesep span { display:inline-block; padding:8px 20px; background:var(--primary-bg); color:var(--primary-tx); border:1px dashed var(--primary); border-radius:22px; font-size:13px; font-weight:700; letter-spacing:1px; }
  /* 设置弹层 */
  .mask { position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; z-index:50; align-items:flex-end; }
  .mask.show { display:flex; }
  .sheet { background:var(--card); width:100%; border-radius:18px 18px 0 0; padding:18px 16px calc(18px + env(safe-area-inset-bottom)); max-height:80vh; overflow-y:auto; }
  .sheet h3 { margin:0 0 14px; font-size:16px; }
  .setrow { display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--line); }
  .setrow:last-of-type { border-bottom:none; }
  .setrow .label { font-size:14px; }
  .setrow .hint { font-size:11px; color:var(--sub); margin-top:3px; }
  .stepper { display:flex; align-items:center; gap:10px; }
  .stepper button { flex:none; width:34px; height:34px; padding:0; border-radius:8px; background:#222; color:var(--txt); border:1px solid var(--line); font-size:18px; }
  .stepper .num { min-width:42px; text-align:center; font-size:16px; font-weight:700; }
  .switch { width:50px; height:28px; border-radius:20px; background:#333; position:relative; cursor:pointer; transition:.2s; flex:none; }
  .switch.on { background:var(--ok); }
  .switch::after { content:''; position:absolute; width:22px; height:22px; border-radius:50%; background:#fff; top:3px; left:3px; transition:.2s; }
  .switch.on::after { left:25px; }
  .seg { display:flex; gap:6px; }
  .seg span { padding:6px 13px; border:1px solid var(--line); border-radius:8px; font-size:13px; color:var(--sub); cursor:pointer; min-width:34px; text-align:center; }
  .seg span.on { color:#fff; border-color:var(--ok); background:#16271c; font-weight:700; }
  .sheet .close { width:100%; margin-top:16px; background:var(--blue); color:#fff; }
  .toast { position:fixed; left:50%; bottom:80px; transform:translateX(-50%); background:#000d; color:#fff; padding:10px 18px; border-radius:10px; font-size:13px; z-index:99; opacity:0; transition:.25s; pointer-events:none; }
  .toast.show { opacity:1; }
  .chap-start { width:100%; margin-top:10px; background:var(--ok); color:#04130a; }
  /* 全部题库：按章节分组 */
  .cblock { margin-bottom:10px; }
  .chead { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; background:var(--card); border:1px solid var(--line); border-radius:12px; cursor:pointer; font-size:15px; font-weight:600; }
  .chead:active { border-color:var(--blue); }
  .chead .ctitle { flex:1; }
  .chead .cnavbtn { padding:4px 8px; cursor:pointer; color:var(--sub); border-radius:6px; display:flex; align-items:center; margin:0 8px; }
  .chead .cnavbtn:active { background:var(--headbtn-bg); color:var(--primary); }
  .chead .ccnt { color:var(--sub); font-size:13px; font-weight:500; white-space:nowrap; margin-left:10px; }
  .cbody { padding-top:10px; }
  .qcard { margin-bottom:12px; }
  .goalhint { font-size:11px; color:var(--sub); text-align:center; margin-top:6px; }
  /* 错题本章节列表 */
  .wrow { display:flex; align-items:center; gap:6px; padding:14px 16px; background:var(--card); border:1px solid var(--line); border-radius:12px; margin-bottom:10px; font-size:15px; cursor:pointer; line-height:1.45; }
  .wrow:active { border-color:#ffa94d; }
  .wrow .wname { flex:1; }
  .wrow .wcnt { color:#ffa94d; font-size:14px; font-weight:700; white-space:nowrap; }
  .wrow.wzero .wname { color:var(--sub); }
  .wrow.wzero .wcnt { color:var(--sub); font-weight:500; }
  .backrow { text-align:center; margin:2px 0 14px; }
  .backrow span { display:inline-block; padding:12px 26px; background:#16243a; border-width:2px; border-style:solid; border-color:#4a90e2; border-radius:10px; font-size:15px; font-weight:700; color:#9cc4f0; cursor:pointer; line-height:1; }
  .backrow span:active { background:#1c3150; }
  /* 主题覆盖：将残留的硬编码深色改为跟随主题变量 */
  .checkin .ci-btn.done { background:var(--ok-bg); color:var(--ok); border:1px solid var(--ok); }
  .mask { background:var(--mask); }
  .stepper button { background:var(--headbtn-bg); }
  .switch { background:var(--switch-off); }
  .seg span.on { color:var(--ok); border-color:var(--ok); background:var(--ok-bg); }
  .sheet .close { background:var(--primary); }
  .toast { background:var(--toast-bg); }
  .wrow:active { border-color:var(--primary); }
  .backrow span { background:var(--primary-bg); border-width:2px; border-style:solid; border-color:var(--blue); color:var(--primary-tx); }
  .backrow span:active { background:var(--primary-active); }
</style>
</head>
<body>
<header>
  <h1 id="h1title">广东二造·安装刷题</h1>
  <div class="headbtns">
    <div class="headbtn on" id="themeBtn">🌙 夜间</div>
    <div class="headbtn" id="subjBtn">📚 安装</div>
    <div class="headbtn" id="setBtn">⚙ 设置</div>
    <div class="headbtn" id="refreshBtn">↻</div>
  </div>
</header>
<div class="stat" id="stat">正确率 --</div>

<div class="checkin" id="checkin">
  <div class="ci-top">
    <div class="ci-left">今日已学 <b id="todayDone">0</b>/<b id="todayGoal">30</b> 道</div>
    <button class="ci-btn go" id="ciBtn">打卡</button>
  </div>
  <div class="ci-bottom">🔥连续 <b id="streak">0</b> 天</div>
</div>

<div class="modes">
  <div class="mode active" data-mode="today">今日练习</div>
  <div class="mode" data-mode="all">全部题库</div>
  <div class="mode" data-mode="wrong">错题本</div>
</div>

<div class="chapbar" id="chapbar" style="display:none;"></div>

<div id="app">
  <div class="empty" id="empty">加载中…</div>
</div>

<footer>题库每日 00:00 更新 · 按教材章节分类刷题</footer>

<!-- 设置弹层 -->
<div class="mask" id="mask">
  <div class="sheet">
    <h3>⚙ 学习设置</h3>
    <div class="setrow">
      <div>
        <div class="label">每日单选题数</div>
        <div class="hint">今日练习中单选题数量（排在前段）</div>
      </div>
      <div class="stepper">
        <button id="scMinus">−</button>
        <span class="num" id="scNum">30</span>
        <button id="scPlus">+</button>
      </div>
    </div>
    <div class="setrow">
      <div>
        <div class="label">每日多选题数</div>
        <div class="hint">今日练习中多选题数量（排在后段）。单选在前、多选在后，中间有题型分隔</div>
      </div>
      <div class="stepper">
        <button id="mcMinus">−</button>
        <span class="num" id="mcNum">20</span>
        <button id="mcPlus">+</button>
      </div>
    </div>
    <div class="setrow">
      <div>
        <div class="label">答对自动跳下一题</div>
        <div class="hint">答对后自动进入下一题；答错停留看解析</div>
      </div>
      <div class="switch" id="autoSwitch"></div>
    </div>
    <div class="setrow">
      <div>
        <div class="label">连续答对移出错题本</div>
        <div class="hint">错题连续答对达到设定次数，自动从错题本移除（3 / 5 / 10 次可选）</div>
      </div>
      <div class="seg" id="streakSeg">
        <span data-v="3">3</span><span data-v="5">5</span><span data-v="10">10</span>
      </div>
    </div>
    <button class="close" id="closeSheet">完成</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- 导航弹窗 -->
<div class="mask" id="navMask">
  <div class="sheet">
    <h3><svg width="20" height="20" viewBox="0 0 20 20" style="vertical-align:middle;margin-right:4px"><circle cx="4" cy="4" r="1.8" fill="none" stroke="currentColor" stroke-width="1.2"/><circle cx="10" cy="4" r="1.8" fill="none" stroke="currentColor" stroke-width="1.2"/><circle cx="16" cy="4" r="1.8" fill="none" stroke="currentColor" stroke-width="1.2"/><circle cx="4" cy="10" r="1.8" fill="none" stroke="currentColor" stroke-width="1.2"/><circle cx="10" cy="10" r="1.8" fill="none" stroke="currentColor" stroke-width="1.2"/><circle cx="16" cy="10" r="1.8" fill="none" stroke="currentColor" stroke-width="1.2"/><circle cx="4" cy="16" r="1.8" fill="none" stroke="currentColor" stroke-width="1.2"/><circle cx="10" cy="16" r="1.8" fill="none" stroke="currentColor" stroke-width="1.2"/><circle cx="16" cy="16" r="1.8" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>题目导航</h3>
    <div class="navgrid" id="navGrid"></div>
    <button class="close" id="closeNav">关闭</button>
  </div>
</div>

<script>
// ====== 专业切换系统 ======
let subject = localStorage.getItem('gd2z_shared_subject') || '安装';
const SUBJECTS = { '安装': '安装刷题', '管理': '管理刷题' };
function saveSubject(s){ subject=s; localStorage.setItem('gd2z_shared_subject', s); }
function getPrefix(){ return subject==='安装'?'gd2z_':'gd2zgl_'; }
function switchSubject(s){
  if(s===subject) return;
  saveSubject(s);
  questions=[]; idx=0; answered=false; selected=[]; currentChapter='__all__'; wrongListView=true;
  initKeys(); updateBank(); updateUI();
  buildChapBar();
  loadBank(); // will chain to loadQuestions
}

// ====== 动态密钥与路径 ======
let WRONG_KEY, RESULT_KEY, STREAK_KEY, SET_KEY, CHECKIN_KEY, TODAY_KEY, SEEN_KEY, TODAYSET_KEY, DAILYSCORE_KEY;
function initKeys(){
  const p=getPrefix();
  WRONG_KEY=p+'wrong_ids'; RESULT_KEY=p+'results'; STREAK_KEY=p+'streaks'; 
  CHECKIN_KEY=p+'checkins'; TODAY_KEY=p+'today'; SEEN_KEY=p+'seen'; TODAYSET_KEY=p+'todayset'; DAILYSCORE_KEY=p+'dailyscore';
}
const BANK = { today:'', all:'', index:'' };
function updateBank(){
  // 相对路径: 本地服务 + GitHub Pages 都适用
  BANK.today = subject==='安装' ? '题库/today.json' : '../管理刷题/题库/today.json';
  BANK.all  = subject==='安装' ? '题库/all_questions.js' : '../管理刷题/题库/all_questions.js';
  BANK.index = subject==='安装' ? '题库/index.json' : '../管理刷题/题库/index.json';
}
function updateUI(){
  document.getElementById('h1title').textContent='广东二造·'+subject+'刷题';
  document.getElementById('subjBtn').textContent='📚 '+subject;
  document.getElementById('subjBtn').classList.toggle('on', subject==='管理');
  updateStat();
}

// ====== 初始化 ======
initKeys(); updateBank();

let todayList = [];
let allList = [];
let chapters = {};
let questions = [];
let idx = 0;
let mode = 'today';
let currentChapter = '__all__';
let answered = false;
let selected = [];
let wrongListView = true;
let chapterPosMap = {}; // 题ID→章节内排序位置（从1开始）
let lastFinishClicked = false; // 每日练习最后一道题是否已点"完成"
let isLoading = false; // 正在加载题库，阻止模式切换

// ---------- 设置（每个专业独立存储）----------
const SET_KEY_SHARED = 'gd2z_shared_settings'; // 旧版共享设置，用于首次迁移
function getSettings(){
  const key = getPrefix()+'settings';
  try {
    let s = JSON.parse(localStorage.getItem(key));
    if(!s){
      // 首次使用：尝试从旧版共享设置迁移
      const old = JSON.parse(localStorage.getItem(SET_KEY_SHARED));
      if(old){ s=old; saveSettings(s); }
    }
    return Object.assign({singleCount:30, multiCount:20, autoNext:true, wrongClearStreak:3}, s||{});
  }
  catch(e){ return {singleCount:30, multiCount:20, autoNext:true, wrongClearStreak:3}; }
}
function saveSettings(s){ localStorage.setItem(getPrefix()+'settings', JSON.stringify(s)); }

// ---------- 打卡 ----------
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function getCheckins(){ try { return JSON.parse(localStorage.getItem(CHECKIN_KEY)||'[]'); } catch(e){ return []; } }
function saveCheckins(a){ localStorage.setItem(CHECKIN_KEY, JSON.stringify(a)); }
function isCheckedToday(){ return getCheckins().includes(todayStr()); }
function doCheckIn(silent){
  const a=getCheckins(); const t=todayStr();
  if(!a.includes(t)){ a.push(t); saveCheckins(a); }
  renderCheckin();
  if(!silent) showToast('✅ 打卡成功！');
}
function getStreak(){
  const a=getCheckins().slice().sort();
  if(!a.length) return 0;
  let streak=0;
  const d=new Date(); d.setHours(0,0,0,0);
  // 允许今天或昨天作为连击起点
  const todayS=todayStr();
  let cursor = a.includes(todayS) ? new Date(d) : new Date(d.getTime()-86400000);
  cursor.setHours(0,0,0,0);
  for(;;){
    const y=cursor.getFullYear(), m=String(cursor.getMonth()+1).padStart(2,'0'), day=String(cursor.getDate()).padStart(2,'0');
    const key=y+'-'+m+'-'+day;
    if(a.includes(key)){ streak++; cursor=new Date(cursor.getTime()-86400000); }
    else break;
  }
  return streak;
}
function renderCheckin(){
  const s=getSettings();
  const ts=readTodaySet();
  const today=todayStr();
  const goal = (ts&&ts.date===today&&ts.ids.length) ? ts.ids.length : ((s.singleCount||0)+(s.multiCount||0));
  const done = (ts&&ts.date===today) ? ts.answered.length : 0;
  document.getElementById('todayGoal').textContent = goal;
  document.getElementById('todayDone').textContent = done;
  document.getElementById('streak').textContent = getStreak();
  const btn=document.getElementById('ciBtn');
  if(isCheckedToday()){ btn.textContent='已打卡'; btn.className='ci-btn done'; btn.disabled=false; }
  else if(goal>0 && done>=goal){ btn.textContent='完成打卡'; btn.className='ci-btn go'; btn.disabled=false; }
  else { btn.textContent='未完成 '+done+'/'+goal; btn.className='ci-btn disabled'; btn.disabled=true; }
}

// ---------- 今日练习集（去重 + 题型分组 + 完成打卡）----------
function getSeen(){ try { return JSON.parse(localStorage.getItem(SEEN_KEY)||'[]'); } catch(e){ return []; } }
function saveSeen(a){ localStorage.setItem(SEEN_KEY, JSON.stringify(a)); }
function readTodaySet(){ try { return JSON.parse(localStorage.getItem(TODAYSET_KEY)); } catch(e){ return null; } }
function getTodayDone(){
  const ts=readTodaySet();
  return (ts&&ts.date===todayStr()) ? ts.answered.length : 0;
}
// 生成本日题集：先取单选(去已见)、再取多选(去已见)，不足则从全池补足；全部加入已见集合实现跨天去重
function genTodaySet(){
  const s=getSettings();
  const sc=Math.max(0,s.singleCount||0), mc=Math.max(0,s.multiCount||0);
  const seen=getSeen();
  let singles=allList.filter(q=>q.type!=='multiple' && !seen.includes(q.id));
  let multis =allList.filter(q=>q.type==='multiple'  && !seen.includes(q.id));
  if(singles.length<sc){ const pool=allList.filter(q=>q.type!=='multiple'); singles=singles.concat(shuffle(pool).filter(q=>!singles.includes(q)).slice(0,sc-singles.length)); }
  if(multis.length <mc){ const pool=allList.filter(q=>q.type==='multiple');  multis =multis.concat(shuffle(pool).filter(q=>!multis.includes(q)).slice(0,mc-multis.length)); }
  singles=shuffle(singles).slice(0,sc);
  multis =shuffle(multis).slice(0,mc);
  const ids=singles.map(q=>q.id).concat(multis.map(q=>q.id));
  saveSeen([...new Set(getSeen().concat(ids))]);
  const ts={date:todayStr(), ids, answered:[], sc, mc};
  localStorage.setItem(TODAYSET_KEY, JSON.stringify(ts));
  return ts;
}
function getTodaySet(){
  const ts=readTodaySet();
  if(ts && ts.date===todayStr() && ts.ids && ts.ids.length) return ts;
  if(!allList.length) return ts||{date:todayStr(), ids:[], answered:[], sc:0, mc:0};
  return genTodaySet();
}
// 标记今日某题已答；全部答完则自动打卡
function markTodayAnswered(id){
  const ts=readTodaySet();
  if(!ts || ts.date!==todayStr()) return;
  if(!ts.answered.includes(id)){ ts.answered.push(id); localStorage.setItem(TODAYSET_KEY, JSON.stringify(ts)); }
  renderCheckin();
  if(ts.ids.length>0 && ts.answered.length>=ts.ids.length && !isCheckedToday()){
    doCheckIn(true);
    showToast('🎉 今日 '+ts.ids.length+' 题已全部完成，自动打卡！');
  }
}
// 调整单选/多选题数后：若今日尚未作答则丢弃旧题集以便按新数量重生成
function regenIfClean(){
  const ts=readTodaySet();
  if(ts && ts.date===todayStr() && ts.answered.length===0){
    saveSeen(getSeen().filter(id=>!ts.ids.includes(id)));
    localStorage.removeItem(TODAYSET_KEY);
    if(mode==='today') loadQuestions();
  }
}

// ---------- 结果/错题 ----------
function getWrongIds(){ try { return JSON.parse(localStorage.getItem(WRONG_KEY)||'[]'); } catch(e){ return []; } }
function addWrong(id){ const a=getWrongIds(); if(!a.includes(id)){ a.push(id); localStorage.setItem(WRONG_KEY, JSON.stringify(a)); } }
function removeWrong(id){ const a=getWrongIds(); if(a.includes(id)){ localStorage.setItem(WRONG_KEY, JSON.stringify(a.filter(x=>x!==id))); } }
// 每题连续答对次数
function getStreaks(){ try { return JSON.parse(localStorage.getItem(STREAK_KEY)||'{}'); } catch(e){ return {}; } }
function saveStreaks(s){ localStorage.setItem(STREAK_KEY, JSON.stringify(s)); }
function getResults(){ try { return JSON.parse(localStorage.getItem(RESULT_KEY)||'{}'); } catch(e){ return {}; } }
function saveResult(id, correct){ const r=getResults(); r[id]={correct:correct, selected:selected.slice()}; localStorage.setItem(RESULT_KEY, JSON.stringify(r)); updateStat(); }
function getSavedSelection(qid){
  const r=getResults()[qid];
  if(!r) return null; // 未答
  if(typeof r==='boolean') return {correct:r, selected:[]}; // 旧格式兼容
  return r; // 新格式 {correct, selected}
}
function isResultCorrect(qid){
  const r=getResults()[qid];
  if(r===undefined) return undefined;
  return (typeof r==='boolean')? r : !!r.correct;
}
function updateStat(){
  if(mode==='today'){
    const ds = getDailyScore();
    const total = ds.correct + ds.wrong;
    if(total===0){ document.getElementById('stat').textContent='今日正确率 --'; return; }
    document.getElementById('stat').textContent = '今日正确率 '+Math.round(ds.correct/total*100)+'% ('+ds.correct+'/'+total+')';
    return;
  }
  if(mode==='all'){
    const r = getResults();
    const ch = (currentChapter!=='__all__') ? currentChapter : null;
    let total=0, ok=0;
    for(const q of allList){
      if(ch && q.chapter!==ch) continue;
      if(r[q.id]!==undefined){ total++; if(isResultCorrect(q.id)) ok++; }
    }
    if(total===0){ document.getElementById('stat').textContent=ch?(chapters[ch]?'第'+(Object.keys(chapters).indexOf(ch)+1)+'章正确率 --':'正确率 --'):'正确率 --'; return; }
    const label = ch ? (chapters[ch]?chapters[ch].replace(/^第.+?章 /,'')+' 正确率':'正确率') : '累计正确率';
    document.getElementById('stat').textContent = label+' '+Math.round(ok/total*100)+'% ('+ok+'/'+total+')';
    return;
  }
  // 错题本等：显示全局正确率
  const r = getResults(); const vals = Object.values(r);
  if(!vals.length){ document.getElementById('stat').textContent='正确率 --'; return; }
  const ok = vals.filter(v=> (typeof v==='boolean')? v : !!v.correct).length;
  document.getElementById('stat').textContent = '正确率 '+Math.round(ok/vals.length*100)+'% ('+ok+'/'+vals.length+')';
}

function parseOptions(q){
  if(Array.isArray(q.options)) return q.options;
  return Object.keys(q.options).map(k=>({key:k, text:q.options[k]}));
}
function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

async function loadBank(){
  isLoading = true;
  document.getElementById('app').innerHTML = '<div class="empty">⏳ 加载题库中…</div>';
  // 安全超时：15秒后强制解锁界面
  const safeTimer = setTimeout(() => { isLoading = false; }, 15000);
  try {
    const ri = await fetch(BANK.index); const meta = await ri.json();
    chapters = meta.chapters || {};
  } catch(e){ chapters = {}; }
  try { const rt = await fetch(BANK.today); todayList = await rt.json(); } catch(e){ todayList = []; }
  // 用 script 加载 .js 题库(比 fetch 更快,手机大文件更可靠)
  try {
    await new Promise((resolve, reject) => {
      const old = document.getElementById('_bank_loader');
      if(old) old.remove();
      const s = document.createElement('script');
      s.id = '_bank_loader';
      s.src = BANK.all.replace('.json','.js');
      s.onload = resolve;
      s.onerror = () => reject(new Error('bank load failed'));
      document.head.appendChild(s);
    });
    allList = window.__BANK__ || [];
  } catch(e){ allList = []; }
  // 计算每道题在章节内的排序位置
  chapterPosMap = {};
  const chapGroups = {};
  for(const q of allList){ if(!chapGroups[q.chapter]) chapGroups[q.chapter]=[]; chapGroups[q.chapter].push(q); }
  for(const ch of Object.keys(chapGroups)){ chapGroups[ch].sort((a,b)=>seqOf(a)-seqOf(b)); chapGroups[ch].forEach((q,i)=>{ chapterPosMap[q.id]=i+1; }); }
  buildChapBar();
  loadQuestions();
  renderCheckin();
  updateStat();
  clearTimeout(safeTimer);
  isLoading = false;
}

function buildChapBar(){
  const bar = document.getElementById('chapbar');

  bar.style.display='flex';
  let html = '<div class="chip '+(currentChapter==='__all__'?'active':'')+'" data-ch="__all__">全部</div>';

// 独立可作答的题目卡片（用于全部题库分组视图）
function buildCard(q){
  const el = document.createElement('div');
  el.className='card qcard';
  el.id = 'qc-'+q.id;
  const pos = chapterPosMap[q.id]||'?';
  const typeLabel = q.type==='multiple' ? '【多选】' : '【单选】';
  const chapTitle = chapters[q.chapter] ? '<span class="chap-tag">'+escapeHtml(chapters[q.chapter])+'</span>' : '';
  const tags = (q.tags||[]).map(t=>'<span class="tag">'+escapeHtml(t)+'</span>').join('');
  const opts = parseOptions(q).map(o=>'<div class="opt" data-key="'+o.key+'"><span class="optkey">'+o.key+'</span><span>'+escapeHtml(o.text)+'</span></div>').join('');
  el.innerHTML =
    '<div class="qmeta"><span class="qtype">'+typeLabel+'</span>'+chapTitle+'<span class="tag" style="color:var(--sub)">第'+pos+'题</span>'+tags+'</div>'+
    '<div class="stem">'+escapeHtml(q.stem)+'</div>'+
    '<div class="opts">'+opts+'</div>'+
    '<div class="result res"></div>'+
    '<div class="analysis ans"><b>正确答案：</b>'+q.answer.join('、')+'<br><b>解析：</b>'+escapeHtml(q.analysis)+'<br><b>来源：</b>'+escapeHtml(q.source||'')+'</div>'+
    '<div class="btns"><button class="submit subbtn">提交</button></div>';
  let sel=[];
  const optEls = el.querySelectorAll('.opt');
  optEls.forEach(o=>o.addEventListener('click', ()=>{
    if(o.classList.contains('correct')||o.classList.contains('wrong')) return; // 已作答
    const k=o.dataset.key;
    if(q.type==='multiple'){
      if(sel.includes(k)){ sel=sel.filter(x=>x!==k); o.classList.remove('sel'); }
      else { sel.push(k); o.classList.add('sel'); }
    } else {
      if(sel.length===1 && sel[0]===k){ sel=[]; o.classList.remove('sel'); }
      else { sel=[k]; optEls.forEach(x=>x.classList.remove('sel')); o.classList.add('sel'); }
    }
  }));
  el.querySelector('.subbtn').addEventListener('click', ()=>{
    if(!sel.length){ alert('请先选择答案'); return; }
    const correct = arraysEqual(sel.slice().sort(), q.answer.slice().sort());
    commitAnswer(q, correct);
    optEls.forEach(o=>{
      o.classList.remove('sel');
      if(q.answer.includes(o.dataset.key)) o.classList.add('correct');
      else if(sel.includes(o.dataset.key)) o.classList.add('wrong');
    });
    const r=el.querySelector('.res');
    r.textContent = correct?'✓ 回答正确':'✗ 回答错误';
    r.className = 'result res '+(correct?'ok':'no')+' show';
    el.querySelector('.ans').classList.add('show');
    el.querySelector('.subbtn').remove();
  });
  return el;
}

function loadQuestions(){
  lastFinishClicked = false;
  if(mode==='wrong' && wrongListView){ renderWrongList(); return; }
  if(mode==='all'){ renderAllGrouped(); return; }
  let list = [];
  let startIdx = 0;
  if(mode==='today'){
    const ts = getTodaySet();
    list = ts.ids.map(id => allList.find(q=>q.id===id)).filter(Boolean);
    // 续答：跳到首个未答题目；若已全部答完则从头复习
    const fu = list.findIndex(q => !(ts.answered||[]).includes(q.id));
    if(fu > 0) startIdx = fu;
  } else if(mode==='wrong'){
    const ids = getWrongIds();
    list = allList.filter(q=>ids.includes(q.id));
    if(currentChapter!=='__all__') list = list.filter(q=>q.chapter===currentChapter);
  }
  questions = list; idx = startIdx; loadSelection(); render();
}

function render(){
  const app=document.getElementById('app');
  if(!questions.length){
    let html='';
    if(mode==='wrong'){
      html += '<div class="backrow"><span id="backWrong">← 返回错题章节</span></div>';
      html += '<div class="empty">📭 本章暂无错题<br>做得好，继续保持！</div>';
    } else {
      html += '<div class="empty">该分类下还没有题目。<br>每日 00:00 会自动生成新题。</div>';
    }
    app.innerHTML = html;
    updateStat();
    const bw=document.getElementById('backWrong');
    if(bw) bw.addEventListener('click', ()=>{ wrongListView=true; loadQuestions(); });
    return;
  }
  const q = questions[idx];
  const res = getResults()[q.id];
  // 已答题：全局恢复选择状态(不限today模式)
  if(!answered){
    const sv=getSavedSelection(q.id);
    if(sv){ selected=sv.selected||[]; answered=true; }
  }
  // 今日练习：已答过的题直接显示对错状态（而非从零作答），每日学完打卡后出现"重新学习"按钮
  let isDailyComplete = false;
  if(mode==='today'){
    const ts=readTodaySet();
    if(ts && ts.date===todayStr()){
      if(ts.answered.includes(q.id)) answered = true;
      isDailyComplete = (ts.answered.length >= ts.ids.length && isCheckedToday());
    }
  }
  const opts = parseOptions(q).map(o=>{
    let cls='opt';
    if(answered){
      if(q.answer.includes(o.key)) cls+=' correct';
      else if(selected.includes(o.key)) cls+=' wrong';
    } else if(selected.includes(o.key)) cls+=' sel';
    return '<div class="'+cls+'" data-key="'+o.key+'"><span class="optkey">'+o.key+'</span><span>'+escapeHtml(o.text)+'</span></div>';
  }).join('');
  const typeLabel = q.type==='multiple' ? '【多选】' : '【单选】';
  const tags = (q.tags||[]).map(t=>'<span class="tag">'+escapeHtml(t)+'</span>').join('');
  const chapTitle = chapters[q.chapter] ? '<span class="chap-tag">'+escapeHtml(chapters[q.chapter])+'</span>' : '';
  // 该题在所属章节中的排序（与buildCard共用chapterPosMap）

  const chNumTag = '<span class="tag" style="color:var(--warn);font-weight:600">第'+chPos+'题</span>';
  let prefix='';
  if(mode==='wrong'){ prefix='<div class="backrow"><span id="backWrong">← 返回错题章节</span></div>'; }
  // 今日练习：单选区→多选区交界处显示题型分隔标识
  let sep='';
  if(mode==='today'){
    const ts=readTodaySet();
    const sc = ts ? (ts.sc||0) : 0;
    if(sc>0 && sc<questions.length && idx===sc){
      sep='<div class="typesep"><span>—— 以下为多选题区 ——</span></div>';
    }
  }
  let html = prefix + sep + '<div class="card">';
  html += '<div class="qmeta"><span class="qtype">'+typeLabel+'</span>'+chapTitle+chNumTag+tags+'</div>';
  html += '<div class="stem">'+ (idx+1)+'. '+escapeHtml(q.stem)+'</div>';
  html += '<div id="opts">'+opts+'</div>';
  const qCorrect = isResultCorrect(q.id);
  html += '<div class="result '+(answered?(qCorrect?'ok':'no'):'')+(answered?' show':'')+'" id="result">'+(answered?(qCorrect?'✓ 回答正确':'✗ 回答错误'):'')+'</div>';
  html += '<div class="analysis '+(answered?'show':'')+'" id="analysis"><b>正确答案：</b>'+q.answer.join('、')+'<br><b>解析：</b>'+escapeHtml(q.analysis)+'<br><b>来源：</b>'+escapeHtml(q.source||'')+'</div>';
  html += '<div class="btns">';
  if(isDailyComplete && lastFinishClicked){
    html += '<button class="restart" id="restartBtn">重新练习</button>';
  } else if(!answered){
    html += '<button class="submit" id="submitBtn">提交</button>';
  } else if(idx < questions.length - 1) {
    html += '<button class="next" id="nextBtn">下一题</button>';
  } else {
    html += '<button class="next" id="nextBtn">完成</button>';
  }
  html += '<button class="navbtn" id="navBtn"><svg width="20" height="20" viewBox="0 0 20 20" style="vertical-align:middle"><circle cx="4" cy="4" r="1.8" fill="none" stroke="currentColor" stroke-width="1.2"/><circle cx="10" cy="4" r="1.8" fill="none" stroke="currentColor" stroke-width="1.2"/><circle cx="16" cy="4" r="1.8" fill="none" stroke="currentColor" stroke-width="1.2"/><circle cx="4" cy="10" r="1.8" fill="none" stroke="currentColor" stroke-width="1.2"/><circle cx="10" cy="10" r="1.8" fill="none" stroke="currentColor" stroke-width="1.2"/><circle cx="16" cy="10" r="1.8" fill="none" stroke="currentColor" stroke-width="1.2"/><circle cx="4" cy="16" r="1.8" fill="none" stroke="currentColor" stroke-width="1.2"/><circle cx="10" cy="16" r="1.8" fill="none" stroke="currentColor" stroke-width="1.2"/><circle cx="16" cy="16" r="1.8" fill="none" stroke="currentColor" stroke-width="1.2"/></svg></button>';
  html += '</div></div>';
  // 进度条：今日显示单选/多选分区，其他模式显示目标题数
  let prog = '第 '+(idx+1)+' / '+questions.length+' 题';
  if(mode==='today'){
    const ts=readTodaySet();
    const sc = ts ? (ts.sc||0) : 0;
    if(sc>0 && idx<sc) prog += '　·　单选题区（1-'+sc+'）';
    else if(sc<questions.length && idx>=sc) prog += '　·　多选题区（'+(sc+1)+'-'+questions.length+'）';
  } else {
    prog += '　·　目标 '+(getSettings().singleCount+getSettings().multiCount)+' 道';
  }
  html += '<div class="progress">'+prog+'</div>';
  app.innerHTML = html;
  updateStat();
  bind();
}

function bind(){
  document.querySelectorAll('#opts .opt').forEach(el=>{
    el.addEventListener('click', ()=>{
      if(answered) return;
      const k = el.dataset.key;
      if(questions[idx].type==='multiple'){
        // 仅切换高亮，不整体重绘，避免移动端点击穿透导致选中又取消
        if(selected.includes(k)){ selected=selected.filter(x=>x!==k); el.classList.remove('sel'); }
        else { selected.push(k); el.classList.add('sel'); }
      } else {
        if(selected.length===1 && selected[0]===k){ selected=[]; el.classList.remove('sel'); }
        else {
          selected=[k];
          document.querySelectorAll('#opts .opt').forEach(o=>o.classList.remove('sel'));
          el.classList.add('sel');
        }
      }
    });
  });
  const sb=document.getElementById('submitBtn');
  if(sb) sb.addEventListener('click', submit);
  const nb=document.getElementById('nextBtn');
  if(nb) nb.addEventListener('click', goNext);
  const rb=document.getElementById('restartBtn');
  if(rb) rb.addEventListener('click', doRestart);
  const nvb=document.getElementById('navBtn');
  if(nvb) nvb.addEventListener('click', showNav);
  const bw=document.getElementById('backWrong');
  if(bw) bw.addEventListener('click', ()=>{ wrongListView=true; loadQuestions(); });
  // 左右滑动切换题目
  const card=document.querySelector('.card');
  if(card){
    card.addEventListener('touchstart', onTouchStart, {passive:true});
    card.addEventListener('touchend', onTouchEnd, {passive:true});
  }
}

// ---------- 每日答对/答错计数器（每日更新）----------
function getDailyScore(){
  try { const ds=JSON.parse(localStorage.getItem(DAILYSCORE_KEY)||'{}'); if(ds.date!==todayStr()) return {date:todayStr(),correct:0,wrong:0}; return ds; }
  catch(e){ return {date:todayStr(),correct:0,wrong:0}; }
}
function saveDailyScore(ds){ localStorage.setItem(DAILYSCORE_KEY, JSON.stringify(ds)); }

// 提交核心：更新连续答对计数 / 错题本 / 正确率 / 打卡；错题连对达标即移除
function commitAnswer(q, correct){
  const streaks = getStreaks();
  if(correct){
    streaks[q.id] = (streaks[q.id]||0) + 1;
    const threshold = getSettings().wrongClearStreak || 3;
    if(getWrongIds().includes(q.id) && streaks[q.id] >= threshold){
      removeWrong(q.id);
      showToast('✅ 已移出错题本（连续答对 '+streaks[q.id]+' 次）');
    }
  } else {
    streaks[q.id] = 0;
    addWrong(q.id);
  }
  saveStreaks(streaks);
  saveResult(q.id, correct);
  if(mode==='today'){
    markTodayAnswered(q.id);
    const ds=getDailyScore();
    if(correct) ds.correct++; else ds.wrong++;
    saveDailyScore(ds);
    renderCheckin();
  }
}

function submit(){
  if(!selected.length){ alert('请先选择答案'); return; }
  const q=questions[idx];
  const correct = arraysEqual(selected.slice().sort(), q.answer.slice().sort());
  commitAnswer(q, correct);
  answered=true;
  render();
  if(correct && getSettings().autoNext && idx<questions.length-1){
    setTimeout(()=>{ idx++; loadSelection(); render(); }, 650);
  }
}
function goNext(){
  if(idx<questions.length-1){ idx++; loadSelection(); render(); }
  else {
    // 最后一道题点"完成" → 检测未答题
    if(mode==='today'){
      const ts=getTodaySet();
      const unanswered=ts.ids.filter(id => !(ts.answered||[]).includes(id));
      if(unanswered.length>0){
        if(!confirm('还有 '+unanswered.length+' 道题目未作答，是否继续提交？')) return;
        // 确认后：将未答题全部标记为已答(但不计成绩)，强制完成今日练习
        unanswered.forEach(id => { if(!ts.answered.includes(id)) ts.answered.push(id); });
        localStorage.setItem(TODAYSET_KEY, JSON.stringify(ts));
        if(!isCheckedToday()) autoCheckin();
      }
    }
    lastFinishClicked = true;
    render();
  }
}
function goPrev(){
  if(idx>0){ idx--; loadSelection(); render(); }
}
function loadSelection(){
  const saved=getSavedSelection(questions[idx].id);
  if(saved){ selected=saved.selected||[]; answered=true; }
  else { selected=[]; answered=false; }
}

// 左右滑动切换题目
let touchStartX=0, touchStartY=0;
function onTouchStart(e){ touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY; }
function onTouchEnd(e){
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)>Math.abs(dy) && Math.abs(dx)>60){
    if(dx<-50){ goNext(); }
    else if(dx>50){ goPrev(); }
  }
}

function showNav(){
  const grid = document.getElementById('navGrid');
  const res = getResults();
  let html = '';
  for(let i=0; i<questions.length; i++){
    const q = questions[i];
    const r = res[q.id];
    let dotCls = 'navdot';
    if(i===idx) dotCls += ' current';
    if(r && (typeof r==='boolean'? r : r.correct)) dotCls += ' correct';
    else if(r!==undefined) dotCls += ' wrong';
    html += '<div class="'+dotCls+'" data-i="'+i+'">'+(i+1)+'</div>';
  }
  grid.innerHTML = html;
  grid.querySelectorAll('.navdot').forEach(d=>{
    d.addEventListener('click', ()=>{
      const i = parseInt(d.dataset.i);
      if(i===idx && !answered) return;
      idx = i; loadSelection(); render();
      closeNav();
    });
  });
  document.getElementById('navMask').classList.add('show');
}
function closeNav(){
  document.getElementById('navMask').classList.remove('show');
}
// 全部题库章节导航器：颜色基于历史做题记录，点击滚动到卡片
function showChapterNav(chapterKey){
  const grid = document.getElementById('navGrid');
  const res = getResults();
  const clist = allList.filter(q=>q.chapter===chapterKey).sort((a,b)=>seqOf(a)-seqOf(b));
  let html = '';
  for(let i=0; i<clist.length; i++){
    const q = clist[i];
    const r = res[q.id];
    let dotCls = 'navdot';
    if(r===true) dotCls += ' correct';
    else if(r===false) dotCls += ' wrong';
    html += '<div class="'+dotCls+'" data-id="'+q.id+'">'+(i+1)+'</div>';
  }
  grid.innerHTML = html;
  grid.querySelectorAll('.navdot').forEach(d=>{
    d.addEventListener('click', ()=>{
      const card = document.getElementById('qc-'+d.dataset.id);
      if(card){ card.scrollIntoView({behavior:'smooth',block:'center'}); card.style.boxShadow='0 0 0 3px var(--primary)'; setTimeout(()=>{card.style.boxShadow='';},1500); }
      closeNav();
    });
  });
  document.getElementById('navMask').classList.add('show');
}
function doRestart(){
  if(!confirm('确定要重新学习今日所有题目吗？\n\n今日答题记录将被清空，已打卡记录保留。')) return;
  const ts=readTodaySet();
  if(ts && ts.date===todayStr()){
    ts.answered = [];
    localStorage.setItem(TODAYSET_KEY, JSON.stringify(ts));
  }
  saveDailyScore({date:todayStr(), correct:0, wrong:0});
  selected=[]; answered=false;
  loadQuestions();
  showToast('🔄 今日练习已重置');
}

function arraysEqual(a,b){ return a.length===b.length && a.every((v,i)=>v===b[i]); }
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1600);
}

// 主题（日间/夜间）
function getTheme(){ 
  let t = localStorage.getItem('gd2z_shared_theme');
  if(!t){ t = localStorage.getItem('gd2z_theme'); if(t) localStorage.setItem('gd2z_shared_theme',t); }
  return t || 'dark';
}
function setTheme(t){ document.documentElement.setAttribute('data-theme', t); localStorage.setItem('gd2z_shared_theme', t); updateThemeBtn(); }
function updateThemeBtn(){
  const b=document.getElementById('themeBtn');
  if(!b) return;
  const t=getTheme();
  b.textContent = t==='dark' ? '🌙 夜间' : '☀ 日间';
  b.classList.toggle('on', t==='dark');
}

// 模式切换
document.querySelectorAll('.mode').forEach(m=>{
  m.addEventListener('click', ()=>{
    if(isLoading) return;
    document.querySelectorAll('.mode').forEach(x=>x.classList.remove('active'));
    m.classList.add('active'); mode=m.dataset.mode;
    currentChapter='__all__'; wrongListView=true;
    buildChapBar();
    loadQuestions();
  });
});

// 设置弹层
const mask=document.getElementById('mask');
function syncSheet(){
  const s=getSettings();
  document.getElementById('scNum').textContent=s.singleCount;
  document.getElementById('mcNum').textContent=s.multiCount;
  document.getElementById('autoSwitch').classList.toggle('on', s.autoNext);
  document.querySelectorAll('#streakSeg span').forEach(x=>x.classList.toggle('on', String(s.wrongClearStreak||3)===x.dataset.v));
}
document.getElementById('setBtn').addEventListener('click', ()=>{ syncSheet(); mask.classList.add('show'); });
document.getElementById('closeSheet').addEventListener('click', ()=>mask.classList.remove('show'));
document.getElementById('scMinus').addEventListener('click', ()=>{ const s=getSettings(); s.singleCount=Math.max(0,s.singleCount-5); saveSettings(s); regenIfClean(); syncSheet(); renderCheckin(); });
document.getElementById('scPlus').addEventListener('click', ()=>{ const s=getSettings(); s.singleCount=Math.min(100,s.singleCount+5); saveSettings(s); regenIfClean(); syncSheet(); renderCheckin(); });
document.getElementById('mcMinus').addEventListener('click', ()=>{ const s=getSettings(); s.multiCount=Math.max(0,s.multiCount-5); saveSettings(s); regenIfClean(); syncSheet(); renderCheckin(); });
document.getElementById('mcPlus').addEventListener('click', ()=>{ const s=getSettings(); s.multiCount=Math.min(100,s.multiCount+5); saveSettings(s); regenIfClean(); syncSheet(); renderCheckin(); });
document.getElementById('autoSwitch').addEventListener('click', ()=>{ const s=getSettings(); s.autoNext=!s.autoNext; saveSettings(s); syncSheet(); });
document.querySelectorAll('#streakSeg span').forEach(x=>{
  x.addEventListener('click', ()=>{ const s=getSettings(); s.wrongClearStreak=parseInt(x.dataset.v,10); saveSettings(s); syncSheet(); });
});
document.getElementById('ciBtn').addEventListener('click', ()=>{ const b=document.getElementById('ciBtn'); if(b.disabled) return; doCheckIn(); if(mode==='today' && questions.length>0) render(); });
document.getElementById('themeBtn').addEventListener('click', ()=>{ setTheme(getTheme()==='dark'?'light':'dark'); });
document.getElementById('subjBtn').addEventListener('click', ()=>{ if(isLoading) return; switchSubject(subject==='安装'?'管理':'安装'); });
document.getElementById('refreshBtn').addEventListener('click', ()=>{ location.reload(); });
// 导航弹窗关闭
document.getElementById('closeNav').addEventListener('click', closeNav);
document.getElementById('navMask').addEventListener('click', function(e){ if(e.target===this) closeNav(); });

updateStat();
renderCheckin();
setTheme(getTheme());
updateUI();
loadBank();
</script>
